baseRadius = "0.3rem"
buttonRadius = "full"
font = "Poppins, sans-serif"
baseFontSize = 16
baseFontWeight = 300
headingFont = "Poppins, sans-serif"
headingFontSizes = ["2.5rem", "2rem", "1,75rem"]
headingFontWeights = [700, 500, 400]
chartCategoricalColors = ["#4ea397", "#22c3aa", "#7bd9a5", "#d0648a", "#f58db2", "#f2b3c9", "#e5cf0d", "#97b552"]

[theme.sidebar]
